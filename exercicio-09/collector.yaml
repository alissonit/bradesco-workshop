apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel-collector
  namespace: observability
spec:
  image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.143.1
  mode: deployment
  replicas: 2
  resources:
    limits:
      memory: 1Gi
      cpu: 500m
    requests:
      memory: 256Mi
      cpu: 100m
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 800
        spike_limit_mib: 200
      batch:
        send_batch_size: 512
        timeout: 5s
      filter:
        error_mode: ignore
        traces:
          span:
            - 'attributes["http.route"] == "/health"'
            - 'attributes["http.route"] == "/ready"'
      transform:
        log_statements:
          - context: log
            statements:
              - replace_pattern(attributes["user.cpf"], "^\\d{3}\\.\\d{3}\\.\\d{3}-\\d{2}$", "[REDACTED]")
              - delete_key(attributes, "auth.token")
              - delete_key(attributes, "db.password")
              - truncate_all(attributes, 256)

    exporters:
      otlp:
        endpoint: backend-observability:4317
        tls:
          insecure: false

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, filter, batch]
          exporters: [otlp]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, transform, batch]
          exporters: [otlp]
