apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector-metrics-targetallocator
rules:
  - apiGroups: [""]
    resources: [pods, nodes, nodes/metrics, services, endpoints, namespaces, configmaps]
    verbs: [get, list, watch]
  - apiGroups: [discovery.k8s.io]
    resources: [endpointslices]
    verbs: [get, list, watch]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses]
    verbs: [get, list, watch]
  - apiGroups: [monitoring.coreos.com]
    resources: [servicemonitors, podmonitors, probes, scrapeconfigs]
    verbs: ["*"]
  - nonResourceURLs: [/metrics, /api, /api/*, /apis, /apis/*]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector-metrics-targetallocator
subjects:
  - kind: ServiceAccount
    name: otel-collector-metrics-targetallocator
    namespace: observability
roleRef:
  kind: ClusterRole
  name: otel-collector-metrics-targetallocator
  apiGroup: rbac.authorization.k8s.io
