apiVersion: apps/v1
kind: Deployment
metadata:
  name: conta-service
  namespace: aplicacoes
spec:
  replicas: 3
  selector:
    matchLabels:
      app: conta-service
  template:
    metadata:
      labels:
        app: conta-service
      annotations:
        # Esta anotação ativa a auto-instrumentação Java do OTel Operator.
        # O Operator injeta um init container com o agente Java do OpenTelemetry
        # e configura as variáveis de ambiente automaticamente.
        instrumentation.opentelemetry.io/inject-java: "observability/otel-instrumentation"
    spec:
      containers:
        - name: conta-service
          image: arey/springboot-petclinic:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: 512Mi
              cpu: 500m
            requests:
              memory: 256Mi
              cpu: 100m
